<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Login - Palantir Clinic</title>
    <link rel="stylesheet" href="../styles/patient_login.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Palantir Clinic</h2>
        <ul>
            <li><a href="../pages/home_page.html">Home</a></li>
            <li><a href="../pages/about.html">About</a></li>
            <li><a href="../pages/locations/locations.html">Locations</a></li>
            <li><a href="staff_login.html">Staff Portal</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="form-card">
        <h2>Patient Login</h2>
        <p class="subtitle">Sign in to manage your appointments</p>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="button" id="btn">Login</button>
        <p id="message"></p>

        <p class="switch-link">Don't have an account? <a href="register.html">Create one here</a></p>
    </div>
</section>

<script src="../scripts/auth/patient_login.js"></script>
</body>
</html>
