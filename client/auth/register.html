<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account - Audit Trail Health</title>
    <link rel="stylesheet" href="/client/styles/auth/register.css">
    <style>
        .pw-rule           { color: #9ca3af; transition: color 0.2s; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .pw-rule::before   { content: "○"; font-size: 10px; flex-shrink: 0; }
        .pw-rule.pass      { color: #16a34a; }
        .pw-rule.pass::before { content: "✓"; }
    </style>
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Audit Trail Health</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/client/pages/about.html">About</a></li>
            <li><a href="/client/pages/locations/locations.html">Locations</a></li>
            <li><a href="/client/auth/staff_login.html">Staff Portal</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="form-card">
        <h2>Create Account</h2>
        <p class="subtitle">Register to book and manage appointments</p>

        <div class="form-grid">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="fname" placeholder="First name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lname" placeholder="Last name" required>
            </div>
            <div class="form-group full-width">
                <label>Email</label>
                <input type="text" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group full-width">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                <div id="pwStrength" style="margin-top:10px;display:none;flex-direction:column;gap:5px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;">
                    <div style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:2px">Password must include</div>
                    <div id="pw-len"   class="pw-rule">At least 8 characters</div>
                    <div id="pw-upper" class="pw-rule">One uppercase letter</div>
                    <div id="pw-num"   class="pw-rule">One number</div>
                    <div id="pw-spec"  class="pw-rule">One special character (!@#$…)</div>
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phonenum" placeholder="(555) 000-0000" required>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="DOB" required>
                <script>
                    (function(){
                        const d = document.getElementById("DOB");
                        const today = new Date().toISOString().split("T")[0];
                        const min   = new Date(); min.setFullYear(min.getFullYear()-130);
                        d.max = today;
                        d.min = min.toISOString().split("T")[0];
                    })();
                </script>
            </div>
        </div>

        <button type="button" id="btn">Create Account</button>
        <p id="message"></p>

        <p class="switch-link">Already have an account? <a href="/client/auth/patient_login.html">Sign in here</a></p>
    </div>
</section>

<script src="/client/scripts/auth/register.js"></script>
</body>
</html>
