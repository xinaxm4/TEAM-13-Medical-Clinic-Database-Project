<!DOCTYPE html>
<html lang="en">
<head>
    <title>Staff Portal - Audit Trail Health</title>
    <link rel="stylesheet" href="/client/styles/auth/staff_login.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Audit Trail Health</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/client/pages/about.html">About</a></li>
            <li><a href="/client/pages/locations/locations.html">Locations</a></li>
            <li><a href="/client/auth/patient_login.html">Patient Login</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="form-card">
        <div class="staff-badge">Staff Portal</div>
        <h2>Physician &amp; Staff Login</h2>
        <p class="subtitle">Access your clinic dashboard</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="button" id="btn">Sign In</button>
        <p id="message"></p>

        <p class="admin-note">Don't have an account? Contact your system administrator.</p>
    </div>
</section>

<script src="/client/scripts/auth/staff_login.js"></script>
</body>
</html>
