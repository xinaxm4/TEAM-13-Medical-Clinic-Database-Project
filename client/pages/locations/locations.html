<!DOCTYPE html>
<html lang="en">
<head>
  <title>Locations - Palantir Clinic</title>
  <link rel="stylesheet" href="/client/styles/pages/locations.css">
  <link rel="stylesheet" href="/client/styles/pages/sidebar.css">
</head>

<body>

<header>
  <nav>
    <h2 class="logo">Palantir Clinic</h2>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/client/pages/about.html">About</a></li>
      <li><a href="/client/auth/patient_login.html">Patient Login</a></li>
      <li><a href="/client/auth/staff_login.html">Staff Portal</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Our Locations</h1>
    <p>Serving patients across multiple states</p>
  </div>
  <div class="scroll-hint">&#8595; View Clinics</div>
</section>

<section class="locations-section">
  <div class="locations-grid" id="locationsGrid">
    <p style="text-align:center;color:#888;padding:40px;grid-column:1/-1">Loading locations&hellip;</p>
  </div>
</section>

<script src="/client/scripts/pages/sidebar.js" defer></script>
<script>
  fetch('/api/locations')
    .then(function(r) { return r.json(); })
    .then(function(clinics) {
      var grid = document.getElementById('locationsGrid');

      if (!clinics || clinics.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#888;padding:40px;grid-column:1/-1">No locations found.</p>';
        return;
      }

      grid.innerHTML = clinics.map(function(c) {
        var citySlug  = encodeURIComponent(c.city);
        var address   = c.street_address ? c.street_address + '<br>' + c.city + ', ' + c.state + ' ' + (c.zip_code || '') : c.city + ', ' + c.state;
        var depts     = c.departments || 'Multiple departments';

        return '<a href="location_detail.html?city=' + citySlug + '" class="location-card">'
          + '<div class="card-icon">&#43;</div>'
          + '<h3>' + c.city + ', ' + c.state + '</h3>'
          + '<p class="card-address">' + address + '</p>'
          + '<p class="card-depts">' + depts.replace(/ · /g, ' &bull; ') + '</p>'
          + '<span class="card-link">View Clinic &rarr;</span>'
          + '</a>';
      }).join('');
    })
    .catch(function(err) {
      console.error('Locations load error:', err);
      document.getElementById('locationsGrid').innerHTML =
        '<p style="text-align:center;color:#c00;padding:40px;grid-column:1/-1">Could not load locations. Make sure the server is running.</p>';
    });
</script>
</body>
</html>
