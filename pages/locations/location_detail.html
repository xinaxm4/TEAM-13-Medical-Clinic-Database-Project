<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clinic - Palantir Clinic</title>
    <link rel="stylesheet" href="../../styles/location_detail.css">
    <link rel="stylesheet" href="../../styles/sidebar.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Palantir Clinic</h2>
        <ul>
            <li><a href="../home_page.html">Home</a></li>
            <li><a href="locations.html">Locations</a></li>
            <li><a href="../about.html">About</a></li>
            <li><a href="../../auth/patient_login.html">Patient Login</a></li>
            <li><a href="../../auth/staff_login.html">Staff Portal</a></li>
        </ul>
    </nav>
</header>

<section class="clinic-banner">
    <div class="banner-text">
        <p class="state-tag" id="bannerState">Loading&hellip;</p>
        <h1 id="bannerTitle">Palantir Clinic</h1>
    </div>
</section>

<div class="page-content">

    <!-- Address -->
    <section>
        <div class="section-header">
            <h2>Clinic Address</h2>
            <div class="bar"></div>
        </div>
        <div class="address-card" id="addressCard">
            <p style="color:#aaa">Loading&hellip;</p>
        </div>
    </section>

    <!-- Departments -->
    <section>
        <div class="section-header">
            <h2>Departments</h2>
            <div class="bar"></div>
        </div>
        <div class="dept-grid" id="deptGrid">
            <p style="color:#aaa">Loading&hellip;</p>
        </div>
    </section>

    <!-- Physicians -->
    <section>
        <div class="section-header">
            <h2>Our Physicians</h2>
            <div class="bar"></div>
        </div>
        <div class="doctors-grid" id="doctorsGrid">
            <p style="color:#aaa">Loading&hellip;</p>
        </div>
    </section>

    <div class="bottom-actions">
        <a href="locations.html" class="back-link">&larr; All Locations</a>
        <a href="../../auth/patient_login.html" class="btn-book">Book an Appointment</a>
    </div>

</div>

<script src="../../scripts/sidebar.js" defer></script>
<script>
  /* ── Read ?city= from URL ── */
  var params = new URLSearchParams(window.location.search);
  var city   = params.get('city');

  if (!city) {
    document.getElementById('bannerTitle').textContent = 'Location Not Found';
    document.getElementById('bannerState').textContent = '';
    document.getElementById('addressCard').innerHTML   = '<p>No city specified. <a href="locations.html">View all locations</a>.</p>';
    document.getElementById('deptGrid').innerHTML      = '';
    document.getElementById('doctorsGrid').innerHTML   = '';
  } else {
    fetch('/api/locations/detail?city=' + encodeURIComponent(city))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var clinic      = data.clinic;
        var departments = data.departments || [];
        var physicians  = data.physicians  || [];

        if (!clinic) {
          document.getElementById('bannerTitle').textContent = city + ' — Not Found';
          document.getElementById('bannerState').textContent = '';
          document.getElementById('addressCard').innerHTML   = '<p>No clinic data found for ' + city + '.</p>';
          document.getElementById('deptGrid').innerHTML      = '<p>No departments on record.</p>';
          document.getElementById('doctorsGrid').innerHTML   = '<p>No physicians on record.</p>';
          return;
        }

        /* ── Banner ── */
        document.title = clinic.city + ' - Palantir Clinic';
        document.getElementById('bannerState').textContent  = clinic.state;
        document.getElementById('bannerTitle').textContent  = 'Palantir Clinic \u2014 ' + clinic.city;

        /* ── Address card ── */
        var phone = clinic.phone_number ? '<p class="phone-main">Main Line: ' + clinic.phone_number + '</p>' : '';
        document.getElementById('addressCard').innerHTML =
          (clinic.street_address ? '<p>' + clinic.street_address + '</p>' : '') +
          '<p>' + clinic.city + ', ' + clinic.state + ' ' + (clinic.zip_code || '') + '</p>' +
          phone +
          '<p>Hours: Monday &ndash; Friday, 8:00 AM &ndash; 6:00 PM</p>';

        /* ── Departments ── */
        if (departments.length === 0) {
          document.getElementById('deptGrid').innerHTML = '<p style="color:#888">No departments on record.</p>';
        } else {
          document.getElementById('deptGrid').innerHTML = departments.map(function(d) {
            return '<div class="dept-card">'
              + '<h4>' + d.department_name + '</h4>'
              + (d.description ? '<p class="dept-desc">' + d.description + '</p>' : '')
              + '</div>';
          }).join('');
        }

        /* ── Physicians ── */
        if (physicians.length === 0) {
          document.getElementById('doctorsGrid').innerHTML = '<p style="color:#888">No physicians on record for this location.</p>';
        } else {
          document.getElementById('doctorsGrid').innerHTML = physicians.map(function(p) {
            var initials = (p.first_name ? p.first_name[0] : '') + (p.last_name ? p.last_name[0] : '');
            return '<div class="doctor-card">'
              + '<div class="avatar">' + initials + '</div>'
              + '<h4>Dr. ' + p.first_name + ' ' + p.last_name + '</h4>'
              + '<p class="specialty">' + (p.specialty || 'General Practice') + '</p>'
              + '<p class="accepts">Accepting new patients</p>'
              + '</div>';
          }).join('');
        }
      })
      .catch(function(err) {
        console.error('Location detail load error:', err);
        document.getElementById('bannerTitle').textContent  = city;
        document.getElementById('bannerState').textContent  = '';
        document.getElementById('addressCard').innerHTML    = '<p style="color:#c00">Could not load clinic data. Make sure the server is running.</p>';
        document.getElementById('deptGrid').innerHTML       = '';
        document.getElementById('doctorsGrid').innerHTML    = '';
      });
  }
</script>
</body>
</html>
