<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Patient Login Webpage</title>
        <link rel="stylesheet" href="Patient_login.css">
    </head>

    <body>

        <h1>Welcome! Please login to your account.</h1>

        <div  class="Patient_login">

            <h2>Sign in</h2>

            <form>

                <label>Email</label>
                <input type="text" id="email" placeholder="Enter Email" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>

                <a href="register.html">Create an account</a>
                
            </form>

            <button type="button" id="btn">LOGIN</button>
            <p id="message"></p>

        </div>

        <script src="patient_login.js"></script>

    </body>

</html>
